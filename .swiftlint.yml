included:
  - Jeda

excluded:
  - Jeda/Resources
  - "Jeda/Views/Reusable Views/JedaTheme.swift"
  - "Jeda/Views/Reusable Views/JedaMoodSliderSupport.swift"
  - .build
  - DerivedData

analyzer_rules:
  - unused_import

# Rules

disabled_rules:
  - todo                      # TODOs allowed during development
  - identifier_name           # too strict for short loop vars (i, x)

opt_in_rules:
  # Code quality — SwiftLint only, not covered by SwiftFormat
  - array_init
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - discouraged_object_literal
  - empty_collection_literal
  - empty_count
  - empty_string
  - enum_case_associated_values_count
  - explicit_init
  - fatal_error_message
  - first_where
  - flatmap_over_map_reduce
  - force_unwrapping
  - last_where
  - literal_expression_end_indentation
  - lower_acl_than_parent
  - modifier_order
  - multiline_arguments
  - multiline_parameters
  - overridden_super_call
  - prefer_self_type_over_type_of_self
  - prefer_zero_over_explicit_init
  - prohibited_super_call
  - redundant_nil_coalescing
  - sorted_first_last
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - vertical_parameter_alignment_on_call
  - yoda_condition

# Thresholds

file_length:
  warning: 150
  error: 150

function_body_length:
  warning: 40
  error: 60

type_body_length:
  warning: 200
  error: 350

line_length:
  warning: 120
  error: 150
  ignores_urls: true
  ignores_comments: true

cyclomatic_complexity:
  warning: 10
  error: 15

nesting:
  type_level:
    warning: 2
  function_level:
    warning: 3

# Naming

type_name:
  min_length: 3
  max_length: 50

function_parameter_count:
  warning: 8
  error: 10

# Force cast / try

force_cast: error
force_try: warning

# Custom rules

custom_rules:
  no_hardcoded_color:
    name: "No Hardcoded Color"
    regex: 'Color\(red:|Color\(hex:|(?<!\.)\bColor\.white\b(?!\.opacity)|(?<!\.)\bColor\.black\b(?!\.opacity)|\.foregroundStyle\(\.white\)|\.foregroundStyle\(\.black\)|\.tint\(Color\.white\)|\.tint\(Color\.black\)|\.gray\b|\.red\b|\.blue\b|\.green\b|\.yellow\b|\.orange\b|\.purple\b|\.pink\b'
    message: "Use JedaColor tokens from JedaTheme.swift instead of hardcoded colors."
    severity: warning

  no_swiftui_in_services:
    name: "No SwiftUI in Services"
    included: ".*Services/.*\\.swift"
    regex: 'import SwiftUI'
    message: "Services layer must not import SwiftUI."
    severity: error
