name: iOS CD (main)

on:
  push:
    branches:
      - main

concurrency:
  group: ios-cd-main-${{ github.sha }}
  cancel-in-progress: true

jobs:
  cd:
    name: CD — Build & Distribute
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Install Apple distribution certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          printf '%s' "$BUILD_CERTIFICATE_BASE64" | base64 -D > "$CERTIFICATE_PATH"
          P12_SIZE=$(wc -c < "$CERTIFICATE_PATH" | tr -d ' ')
          echo "Decoded .p12 size: ${P12_SIZE} bytes"

          if [ "$P12_SIZE" -lt 2500 ]; then
            echo "::error::Decoded .p12 terlalu kecil (${P12_SIZE} bytes). Secret BUILD_CERTIFICATE_BASE64 masih file lama."
            echo "::error::Encode ulang certificate-jeda.p12: base64 -i certificate-jeda.p12 | pbcopy"
            exit 1
          fi

          if ! openssl pkcs12 -in "$CERTIFICATE_PATH" -noout -passin "pass:$P12_PASSWORD" -legacy 2>/dev/null; then
            echo "::error::Invalid .p12 file or wrong P12_PASSWORD secret."
            exit 1
          fi

          openssl pkcs12 -in "$CERTIFICATE_PATH" -passin "pass:$P12_PASSWORD" -legacy -clcerts -nokeys -out "$RUNNER_TEMP/cert.pem" 2>/dev/null
          CERT_BYTES=$(wc -c < "$RUNNER_TEMP/cert.pem" | tr -d ' ')
          echo "Extracted certificate size: ${CERT_BYTES} bytes"

          if [ "$CERT_BYTES" -lt 100 ]; then
            echo "::error::Tidak bisa mengekstrak certificate dari .p12."
            echo "::error::Pastikan BUILD_CERTIFICATE_BASE64 dari certificate-jeda.p12 (~3340 bytes) dan P12_PASSWORD=jeda."
            exit 1
          fi

          curl -sL -o /tmp/AppleWWDRCAG6.cer https://www.apple.com/certificateauthority/AppleWWDRCAG6.cer
          curl -sL -o /tmp/AppleWWDRCAG3.cer https://www.apple.com/certificateauthority/AppleWWDRCAG3.cer

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          security import /tmp/AppleWWDRCAG6.cer -k "$KEYCHAIN_PATH" -T /usr/bin/codesign -T /usr/bin/security || true
          security import /tmp/AppleWWDRCAG3.cer -k "$KEYCHAIN_PATH" -T /usr/bin/codesign -T /usr/bin/security || true

          security import "$CERTIFICATE_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$P12_PASSWORD" \
            -f pkcs12 \
            -A \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -T /usr/bin/productbuild

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH" || true

          echo "Available code signing identities:"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          if ! security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep -qE 'Apple Distribution|iPhone Distribution'; then
            echo "::error::No Distribution certificate found. Re-encode .p12 to BUILD_CERTIFICATE_BASE64 secret."
            exit 1
          fi

      - name: Install provisioning profile
        env:
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
        run: |
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          printf '%s' "$BUILD_PROVISION_PROFILE_BASE64" | base64 -D > "$PP_PATH"

          echo "Installed provisioning profile:"
          security cms -D -i "$PP_PATH" | plutil -extract Name raw -

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          PP_UUID=$(/usr/libexec/PlistBuddy -c 'Print UUID' /dev/stdin <<< "$(security cms -D -i "$PP_PATH")")
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/"$PP_UUID".mobileprovision

      - name: Resolve Swift Package dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project Jeda.xcodeproj \
            -scheme Jeda

      - name: Create ExportOptions.plist
        env:
          PROVISIONING_PROFILE_NAME: ${{ secrets.PROVISIONING_PROFILE_NAME }}
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>ad-hoc</string>
            <key>teamID</key>
            <string>6U2QP37AEF</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.dicoding.jeda</key>
              <string>${PROVISIONING_PROFILE_NAME}</string>
            </dict>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF

      - name: Archive iOS app
        env:
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -o pipefail
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          xcodebuild archive \
            -project Jeda.xcodeproj \
            -scheme Jeda \
            -configuration Release \
            -archivePath $RUNNER_TEMP/Jeda.xcarchive \
            -destination 'generic/platform=iOS' \
            DEVELOPMENT_TEAM=6U2QP37AEF

      - name: Export IPA
        env:
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -o pipefail
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $RUNNER_TEMP/app-signing.keychain-db
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/Jeda.xcarchive \
            -exportPath $RUNNER_TEMP/export \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          groups: ${{ secrets.FIREBASE_TESTER_GROUPS }}
          file: ${{ runner.temp }}/export/Jeda.ipa
          releaseNotes: |
            Build: ${{ github.run_number }}
            Commit: ${{ github.sha }}
            Author: ${{ github.actor }}

      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
